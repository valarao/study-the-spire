services:
  postgres:
    image: postgres:16
    container_name: study-the-spire-postgres
    environment:
      POSTGRES_DB: study_the_spire
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d study_the_spire"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
