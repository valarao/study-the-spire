include "common.conf"

# Local development — run with: CONFIG=development ./gradlew run
# Replace with your actual Clerk dev instance domain.
clerk {
  jwksUrl = ${?CLERK_JWKS_URL}
  issuer  = ${?CLERK_ISSUER}
}

rest {
  plugins {
    callLogging {
      useColors = true
    }
  }
}

# Local Postgres from infra/local/docker-compose.yml.
sql {
  connectionFactory {
    url = "r2dbc:postgresql://localhost:5432/study_the_spire"
    username = "postgres"
    password = "postgres"
    ssl = false
  }
}
