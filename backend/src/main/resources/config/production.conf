include "common.conf"

# Cloud Run binds externally and injects PORT.
rest {
  connector {
    host = "0.0.0.0"
    port = ${?PORT}
  }
}

# Cloud SQL via the GCP R2DBC socket factory (uses --add-cloudsql-instances).
sql {
  connectionFactory {
    url = "r2dbc:gcp:postgresql://"${?INSTANCE_CONNECTION_NAME}"/"${?DB_NAME}
    username = ${?DB_USER}
    password = ${?DB_PASSWORD}
  }
}
