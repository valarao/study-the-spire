name: contracts-ci

on:
  push:
    branches: [main]
    paths:
      - 'contracts/**'
      - 'tools/contracts-ci/**'
      - '.github/workflows/contracts-ci.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - 'tools/contracts-ci/**'
      - '.github/workflows/contracts-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for the changelog diff check
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: tools/contracts-ci
        run: pnpm install --frozen-lockfile
      - working-directory: tools/contracts-ci
        run: pnpm validate
      - name: Enforce CHANGELOG touched on contracts changes
        if: github.event_name == 'pull_request'
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          changed=$(git diff --name-only "$base" "$head" -- contracts/ | grep -v '^contracts/CHANGELOG\.md$' || true)
          if [ -n "$changed" ]; then
            if ! git diff --name-only "$base" "$head" -- contracts/CHANGELOG.md | grep -q .; then
              echo "::error::Contracts changed but contracts/CHANGELOG.md was not updated."
              echo "Changed files:"
              echo "$changed"
              exit 1
            fi
          fi
