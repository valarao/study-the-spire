name: mod-tests

on:
  push:
    branches: [main]
    paths:
      - 'mod/**'
      - '.github/workflows/mod-tests.yml'
  pull_request:
    paths:
      - 'mod/**'
      - '.github/workflows/mod-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet test mod/StudyTheSpire.Tests/StudyTheSpire.Tests.csproj
        env:
          DOTNET_NOLOGO: 1
          DOTNET_CLI_TELEMETRY_OPTOUT: 1
